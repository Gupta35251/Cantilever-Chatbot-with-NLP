<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>

    <style>
        body{
            font-family: Arial;
            width: 700px;
            margin: 40px auto;
        }

        #chatbox{
            height:400px;
            border:1px solid #ccc;
            overflow-y:auto;
            padding:10px;
            margin-bottom:10px;
        }

        input{
            width:80%;
            padding:10px;
        }

        button{
            padding:10px;
        }

        .user{
            color:blue;
            margin:10px 0;
        }

        .bot{
            color:green;
            margin:10px 0;
        }
    </style>
</head>

<body>

<h2>Seq2Seq Chatbot</h2>

<div id="chatbox"></div>

<input
    type="text"
    id="message"
    placeholder="Type message..."
>

<button onclick="sendMessage()">
    Send
</button>

<script>

function sendMessage(){

    let message =
        document.getElementById("message").value;

    if(message.trim()==="")
        return;

    let chatbox =
        document.getElementById("chatbox");

    chatbox.innerHTML +=
        "<div class='user'><b>You:</b> "
        + message +
        "</div>";

    fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/x-www-form-urlencoded"
        },

        body:
        "message="
        + encodeURIComponent(message)

    })

    .then(response => response.json())

    .then(data => {

        chatbox.innerHTML +=
            "<div class='bot'><b>Bot:</b> "
            + data.response +
            "</div>";

        chatbox.scrollTop =
            chatbox.scrollHeight;
    });

    document.getElementById("message").value="";
}

</script>

</body>
</html>
